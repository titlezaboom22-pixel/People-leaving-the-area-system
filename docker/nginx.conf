# 🌐 Nginx config — serve React SPA + multi-page (vehicle.html, etc.)
server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets นาน — แต่ HTML ห้าม cache (ให้ refresh เห็นเวอร์ชันใหม่)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Multi-page routing — ส่งให้ HTML แต่ละหน้า ไม่ใช่ index ทั้งหมด
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy email server requests → port 3001 (internal)
    location /api/ {
        proxy_pass http://localhost:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 90s;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
